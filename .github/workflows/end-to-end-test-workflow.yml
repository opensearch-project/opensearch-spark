name: End-to-End Tests

on:
  pull_request:
  push:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        entry:
          - { os: ubuntu-latest, java: 11 }
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Free up disk space
        # The integ-test docker images total ~10GB and saving/loading them needs headroom.
        # GitHub runners ship with large toolchains this job does not use; remove them.
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Set up JDK 11
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3
        with:
          distribution: 'temurin'
          java-version: 11

      - name: Set up SBT
        uses: sbt/setup-sbt@2e222825582620cc38d2a54e674f3c01b7c14f5d # v1

      - name: Set SBT_OPTS
        # Needed to extend the JVM memory size to avoid OutOfMemoryError for HTML test report
        run: echo "SBT_OPTS=-Xmx2G" >> $GITHUB_ENV

      - name: Build assembly JARs for the docker cluster
        # The docker-compose cluster bind-mounts the PPL/Flint/SQL-app assembly JARs
        # ($PPL_JAR, $FLINT_JAR, $SQL_APP_JAR in docker/integ-test/.env) into the Spark
        # containers. They must exist before EndToEndITSuite runs `docker compose up`,
        # otherwise the Spark containers fail to start and the suite aborts on a
        # connection-refused to the cluster.
        run: sbt pplSparkIntegration/assembly flintSparkIntegration/assembly sparkSqlApplication/assembly

      - name: Cache integ-test docker images
        # The integ-test metastore image downloads the Hadoop (~663MB) and Hive distributions
        # from archive.apache.org, which is heavily throttled (~15-30 min each). Building the
        # cluster images here and caching the layers keeps EndToEndITSuite's `docker compose up`
        # from rebuilding them on every run (which otherwise blows past its startup timeout).
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: /tmp/integ-test-images
          key: integ-test-images-${{ hashFiles('docker/integ-test/**/Dockerfile', 'docker/integ-test/.env', 'docker/integ-test/docker-compose.yml') }}

      - name: Load or build integ-test docker images
        # Restore prebuilt images from the cache if present; otherwise build them with
        # `docker compose build` and save them (gzip-compressed) for subsequent runs. Either
        # way the images end up in the local docker image store, so the suite's
        # `docker compose up -d` reuses them instead of rebuilding.
        working-directory: docker/integ-test
        run: |
          if [ -f /tmp/integ-test-images/images.tar.gz ]; then
            echo "Restoring integ-test images from cache"
            gunzip -c /tmp/integ-test-images/images.tar.gz | docker load
          else
            echo "Building integ-test images (cache miss)"
            docker compose build
            # The combined images are ~10GB uncompressed; the runner has limited free disk, so
            # gzip the saved archive to keep it small enough to fit and cache.
            mkdir -p /tmp/integ-test-images
            docker save \
              integ-test-metastore integ-test-opensearch integ-test-spark integ-test-spark-worker integ-test-spark-submit \
              | gzip > /tmp/integ-test-images/images.tar.gz
          fi

      - name: End-to-End Test
        run: sbt e2etest/test

      - name: Upload test report
        if: always() # Ensures the artifact is saved even if tests fail
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-reports
          path: target/test-reports # Adjust this path if necessary